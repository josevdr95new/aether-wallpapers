<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Quote Rotator</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a0a14;color:#fff;
font-family:'Segoe UI';display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px}
.q{max-width:700px;font-size:32px;font-weight:200;line-height:1.4;
transition:opacity 1.2s;opacity:0;letter-spacing:1px}
.a{font-size:14px;color:#9ca3af;margin-top:24px;letter-spacing:3px;transition:opacity 1.2s;opacity:0}
.decorate{position:absolute;width:60px;height:1px;background:linear-gradient(90deg,transparent,#5eb3ff,transparent);transition:opacity 1.2s;opacity:0}
.d1{top:30%}.d2{bottom:30%}
</style></head><body>
<div class="decorate d1"></div>
<div class="q" id="q"></div>
<div class="a" id="a"></div>
<div class="decorate d2"></div>
<script>
const data=[
  {q:'El único modo de hacer un gran trabajo es amar lo que haces.',a:'Steve Jobs'},
  {q:'La imaginación es más importante que el conocimiento.',a:'Einstein'},
  {q:'No cuentes los días, haz que los días cuenten.',a:'Muhammad Ali'},
  {q:'El futuro pertenece a quienes creen en la belleza de sus sueños.',a:'Eleanor Roosevelt'},
  {q:'Sé tú el cambio que quieres ver en el mundo.',a:'Gandhi'},
  {q:'La vida es lo que pasa mientras estás ocupado haciendo otros planes.',a:'John Lennon'},
  {q:'Si puedes soñarlo, puedes hacerlo.',a:'Walt Disney'},
  {q:'El éxito es ir de fracaso en fracaso sin perder el entusiasmo.',a:'Winston Churchill'},
];
let i=0;
function show(){
  const d=data[i%data.length],q=document.getElementById('q'),a=document.getElementById('a');
  q.style.opacity=0;a.style.opacity=0;
  document.querySelectorAll('.decorate').forEach(e=>e.style.opacity=0);
  setTimeout(()=>{
    q.textContent=`"${d.q}"`;a.textContent=`— ${d.a}`;
    q.style.opacity=1;a.style.opacity=1;
    document.querySelectorAll('.decorate').forEach(e=>e.style.opacity=1);
  },800);
  i++;
}
show();
setInterval(show,6000);
</script></body></html>

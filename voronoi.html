<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Voronoi</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a0a14}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const N=30;
const pts=Array.from({length:N},()=>({x:Math.random()*w,y:Math.random()*h,
vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;
  pts.forEach(p=>{p.x=Math.random()*w;p.y=Math.random()*h})}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<60){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='#0a0a14';x.fillRect(0,0,w,h);
  pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>w)p.vx*=-1;if(p.y<0||p.y>h)p.vy*=-1});
  const img=x.getImageData(0,0,w,h);
  const d=img.data;
  for(let y=0;y<h;y+=4)for(let xx=0;xx<w;xx+=4){
    let mN=0,mD=Infinity,ci=0;
    for(let i=0;i<N;i++){
      const dx=pts[i].x-xx,dy=pts[i].y-y,d2=dx*dx+dy*dy;
      if(d2<mD){mD=d2;ci=i}
    }
    const c1=Math.sin(ci*.7)*127+128,c2=Math.sin(ci*1.3+1)*127+128;
    for(let dy=0;dy<4;dy++)for(let dx=0;dx<4;dx++){
      const idx=((y+dy)*w+(xx+dx))*4;
      d[idx]=(c1+128)%255;d[idx+1]=(c2+128)%255;d[idx+2]=(c1+c2)%255;d[idx+3]=255;
    }
  }
  x.putImageData(img,0,0);
  pts.forEach((p,i)=>{
    x.fillStyle=`hsl(${i*12},80%,50%)`;
    x.beginPath();x.arc(p.x,p.y,2,0,Math.PI*2);x.fill();
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

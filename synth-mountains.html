<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Synth Mountains</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#1a0a3a;perspective:400px}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  const gr=x.createLinearGradient(0,0,0,h);
  gr.addColorStop(0,'#1a0a3a');gr.addColorStop(.5,'#ff2d92');gr.addColorStop(.6,'#fbbf24');
  gr.addColorStop(.61,'#000');gr.addColorStop(1,'#000');
  x.fillStyle=gr;x.fillRect(0,0,w,h);
  x.fillStyle='#000';
  x.beginPath();x.moveTo(0,h*.7);
  for(let i=0;i<=20;i++){const px=i/20*w;
    const py=h*.7+Math.sin(i*.5+n*.0003)*20-Math.cos(i*.3)*15;
    x.lineTo(px,py)}
  x.lineTo(w,h);x.lineTo(0,h);x.fill();
  const sx=w/2,sy=h*.55,R=80;
  for(let i=0;i<6;i++){
    x.fillStyle=i%2?'#fbbf24':'#1a0a3a';
    x.fillRect(sx-R,sy+i*15,R*2,7);
  }
  for(let z=1;z<4;z++){
    x.strokeStyle=`rgba(255,45,146,${.8-z*.2})`;x.lineWidth=2;
    x.beginPath();
    for(let i=0;i<w;i+=20){
      const py=h*.7+z*60+Math.sin((i+z*100)*.01+n*.001)*20;
      if(i===0)x.moveTo(i,py);else x.lineTo(i,py);
    }
    x.stroke();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

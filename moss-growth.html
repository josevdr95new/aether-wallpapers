<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Moss Growth</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#1a0a0a}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const blobs=[];
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
function loop(n){
  if(n-last<100){requestAnimationFrame(loop);return}last=n;t+=.1;
  if(t>3&&blobs.length<300)blobs.push({x:Math.random()*w,y:h+10,
    vx:0,vy:-.2-Math.random()*.3,r:1+Math.random()*3,a:Math.random()*Math.PI*2});
  x.fillStyle='rgba(26,10,10,.3)';x.fillRect(0,0,w,h);
  blobs.forEach(b=>{
    b.x+=Math.sin(b.a)*.5;b.y+=b.vy;b.r+=.01;
    if(b.y<-10)b.y=h+10;
    const gr=x.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*3);
    gr.addColorStop(0,`rgba(${50+Math.random()*30},${150+Math.random()*80},50,.4)`);
    gr.addColorStop(1,'transparent');
    x.fillStyle=gr;x.beginPath();x.arc(b.x,b.y,b.r*3,0,Math.PI*2);x.fill();
    x.fillStyle=`rgba(${30+Math.random()*40},${120+Math.random()*60},40,.6)`;
    x.beginPath();x.arc(b.x,b.y,b.r,0,Math.PI*2);x.fill();
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Todo List</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a0f1a;color:#fff;
font-family:'Segoe UI';display:flex;align-items:center;justify-content:center;flex-direction:column}
h1{font-size:24px;letter-spacing:4px;color:#9ca3af;font-weight:300;margin-bottom:24px}
ul{list-style:none;padding:0;margin:0;width:min(420px,80vw)}
li{padding:14px 18px;margin:6px 0;background:#1a1f2e;border-radius:10px;display:flex;
align-items:center;gap:12px;animation:s .4s ease-out}
@keyframes s{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
.b{width:18px;height:18px;border:2px solid #5eb3ff;border-radius:4px;flex-shrink:0;cursor:pointer;transition:all .3s}
.b.d{background:#5eb3ff;box-shadow:0 0 12px #5eb3ff88}
.t{flex:1;font-size:14px;color:#d1d5db;transition:all .3s}
.dd .t{text-decoration:line-through;color:#6b7280}
.dot{width:6px;height:6px;border-radius:50%;background:#fbbf24}
</style></head><body>
<h1>TODO</h1>
<ul id="l"></ul>
<script>
const items=['Configurar wallpaper','Comprar café','Revisar correo','Hacer ejercicio',
'Leer 30 minutos','Llamar a mamá','Terminar proyecto','Practicar piano','Paseo nocturno'];
let last=0,idx=0;
const ul=document.getElementById('l');
function add(){
  const item=items[idx%items.length];
  const li=document.createElement('li');
  li.innerHTML=`<div class="b" onclick="this.parentElement.classList.toggle('dd');this.classList.toggle('d')"></div><div class="dot"></div><div class="t">${item}</div>`;
  ul.insertBefore(li,ul.firstChild);
  while(ul.children.length>6)ul.removeChild(ul.lastChild);
  idx++;
}
function loop(n){
  if(n-last<2000){requestAnimationFrame(loop);return}last=n;
  add();
  requestAnimationFrame(loop);
}
add();add();add();
requestAnimationFrame(loop);
</script></body></html>

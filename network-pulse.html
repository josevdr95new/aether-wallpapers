<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Network Pulse</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a0e1a;color:#fff;
font-family:'Segoe UI';overflow:hidden}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const NODES=Array.from({length:12},()=>({x:0,y:0,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5}));
const PKTS=[];
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;
  NODES.forEach(n=>{if(!n.px){n.x=Math.random()*w;n.y=Math.random()*h;n.px=n.x;n.py=n.y}})}
addEventListener('resize',rs);rs();
function spawn(){if(PKTS.length<30)PKTS.push({from:Math.floor(Math.random()*NODES.length),to:Math.floor(Math.random()*NODES.length),t:0})}
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(10,14,26,.25)';x.fillRect(0,0,w,h);
  NODES.forEach(n=>{
    n.x+=n.vx;n.y+=n.vy;
    if(n.x<0||n.x>w)n.vx*=-1;if(n.y<0||n.y>h)n.vy*=-1;
    x.fillStyle='#5eb3ff';x.beginPath();x.arc(n.x,n.y,3,0,Math.PI*2);x.fill();
    x.shadowColor='#5eb3ff';x.shadowBlur=8;x.fill();x.shadowBlur=0;
  });
  for(let i=0;i<NODES.length;i++)for(let j=i+1;j<NODES.length;j++){
    const a=NODES[i],b=NODES[j],d=Math.hypot(a.x-b.x,a.y-b.y);
    if(d<150){x.strokeStyle=`rgba(91,179,255,${1-d/150*.3})`;x.lineWidth=1;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke()}
  }
  if(Math.random()<.15)spawn();
  PKTS.forEach((p,i)=>{
    const a=NODES[p.from],b=NODES[p.to];
    p.t+=0.04;if(p.t>=1){PKTS.splice(i,1);return}
    const px=a.x+(b.x-a.x)*p.t,py=a.y+(b.y-a.y)*p.t;
    x.fillStyle='#ff7ad9';x.shadowColor='#ff7ad9';x.shadowBlur=10;
    x.beginPath();x.arc(px,py,2,0,Math.PI*2);x.fill();x.shadowBlur=0;
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

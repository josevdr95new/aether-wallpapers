<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Lightning Storm</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const clouds=Array.from({length:5},()=>({x:Math.random()*w,y:Math.random()*h*.3,
r:60+Math.random()*80,vx:(Math.random()-.5)*.3}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let flashes=[];
let flashI=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(0,0,10,.2)';x.fillRect(0,0,w,h);
  clouds.forEach(cl=>{
    cl.x+=cl.vx;if(cl.x>w+cl.r)cl.x=-cl.r;if(cl.x<-cl.r)cl.x=w+cl.r;
    const gr=x.createRadialGradient(cl.x,cl.y,0,cl.x,cl.y,cl.r);
    gr.addColorStop(0,'rgba(40,40,50,.6)');gr.addColorStop(1,'transparent');
    x.fillStyle=gr;x.beginPath();x.arc(cl.x,cl.y,cl.r,0,Math.PI*2);x.fill();
  });
  flashI++;
  if(flashI>200&&Math.random()<.05){
    flashI=0;
    let fx=Math.random()*w,fy=Math.random()*h*.3+50;
    flashes=[];flashes.push({x:fx,y:fy});
    while(fy<h){
      fy+=20+Math.random()*20;
      fx+=(Math.random()-.5)*40;
      flashes.push({x:fx,y:fy});
      if(fy>h*.9)break;
    }
    x.strokeStyle='#fff';x.lineWidth=3;x.shadowColor='#5eb3ff';x.shadowBlur=20;
    x.beginPath();x.moveTo(flashes[0].x,flashes[0].y);
    flashes.forEach(p=>x.lineTo(p.x,p.y));x.stroke();x.shadowBlur=0;
    x.fillStyle='rgba(255,255,255,.2)';x.fillRect(0,0,w,h);
  }else flashes=[];
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

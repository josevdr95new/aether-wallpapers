<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Cassette</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#1a1a2a;color:#fff;
font-family:'Courier New';display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px}
.cassette{width:520px;height:320px;background:linear-gradient(180deg,#2a2a3a,#1a1a2a);
border:3px solid #444;border-radius:18px;padding:30px;box-shadow:0 0 40px rgba(0,0,0,.5)}
.label{background:#5eb3ff;color:#000;padding:18px;border-radius:6px;text-align:center;
font-weight:bold;font-size:18px;letter-spacing:2px}
.wheels{display:flex;justify-content:space-around;margin-top:30px}
.wheel{width:90px;height:90px;border-radius:50%;background:radial-gradient(circle,#000 30%,#fff 30%,#fff 35%,#000 35%);
border:8px solid #444;position:relative}
.wheel::before{content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
width:24px;height:24px;border-radius:50%;background:#888}
.t{color:#5eb3ff;letter-spacing:6px}
</style></head><body>
<div class="cassette">
  <div class="label">AETHER MIX · 2026</div>
  <div class="wheels">
    <div class="wheel" id="w1"></div>
    <div class="wheel" id="w2"></div>
  </div>
</div>
<div class="t">SIDE A</div>
<script>
let a=0,last=0;
const w1=document.getElementById('w1'),w2=document.getElementById('w2');
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  a+=2;w1.style.transform=`rotate(${a}deg)`;w2.style.transform=`rotate(${a}deg)`;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

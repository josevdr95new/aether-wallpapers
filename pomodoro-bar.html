<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pomodoro Bar</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#1a0f0a;color:#fff;
font-family:'Segoe UI';display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px}
h1{font-weight:200;font-size:32px;letter-spacing:6px;color:#6b7280}
.bar{width:min(720px,80vw);height:24px;background:#2a1a14;border-radius:12px;overflow:hidden;position:relative}
.fill{height:100%;background:linear-gradient(90deg,#ff6b35,#ff9558);border-radius:12px;transition:width .3s}
.label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;letter-spacing:1px}
.t{font-size:64px;font-weight:200;letter-spacing:3px}
</style></head><body>
<h1>POMODORO</h1>
<div class="bar"><div class="fill" id="f"></div><div class="label" id="l">0%</div></div>
<div class="t" id="t">25:00</div>
<script>
const TOTAL=25*60,TICK=1/30;
let e=0,last=0;
function fmt(s){const m=Math.floor(s/60),x=Math.floor(s%60);return `${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`}
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  e+=TICK;if(e>TOTAL)e=0;
  const p=e/TOTAL;
  document.getElementById('f').style.width=(p*100)+'%';
  document.getElementById('l').textContent=Math.round(p*100)+'%';
  document.getElementById('t').textContent=fmt(TOTAL-e);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

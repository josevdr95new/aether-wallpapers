<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Asteroid Belt</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const N=80;
const ast=Array.from({length:N},()=>({a:Math.random()*Math.PI*2,d:0,v:.0005+Math.random()*.001,
sz:1+Math.random()*2,rot:Math.random()*Math.PI*2}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(0,0,0,.3)';x.fillRect(0,0,w,h);
  const cx=w/2,cy=h/2,maxR=Math.min(w,h)*.45;
  ast.forEach(a=>{
    a.a+=a.v;a.rot+=.01;
    if(a.d===0)a.d=.5+Math.random()*.5;
    const r=maxR*a.d;
    const px=cx+Math.cos(a.a)*r,py=cy+Math.sin(a.a)*r;
    x.save();x.translate(px,py);x.rotate(a.rot);
    x.fillStyle=`hsl(${30+a.d*10},30%,${30+a.d*20}%)`;
    x.beginPath();
    for(let i=0;i<8;i++){
      const ang=i*Math.PI*2/8;
      const rr=a.sz*(1+Math.sin(a.rot+i)*.3);
      x.lineTo(Math.cos(ang)*rr,Math.sin(ang)*rr);
    }
    x.closePath();x.fill();x.restore();
  });
  const gr=x.createRadialGradient(cx,cy,0,cx,cy,30);
  gr.addColorStop(0,'#ff6b35');gr.addColorStop(.5,'#c2410c');gr.addColorStop(1,'transparent');
  x.fillStyle=gr;x.beginPath();x.arc(cx,cy,30,0,Math.PI*2);x.fill();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

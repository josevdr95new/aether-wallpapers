<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Weather Widget</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(180deg,#0c1e3a,#1e3a5f);
font-family:'Segoe UI';display:flex;align-items:center;justify-content:center;color:#fff}
.c{text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.t{font-size:90px;font-weight:200;letter-spacing:-3px}
.l{font-size:18px;color:#9ca3af;margin-top:6px}
.s{font-size:48px;margin:8px 0 4px}
.h{font-size:12px;color:#6b7280;margin-top:18px;letter-spacing:2px}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:-1}
</style></head><body>
<canvas id="cv"></canvas>
<div class="c">
  <div class="s" id="s">☀</div>
  <div class="t" id="t">22°</div>
  <div class="l" id="l">Soleado</div>
  <div class="h" id="h">MOSTOLES · ESPAÑA</div>
</div>
<script>
const c=document.getElementById('cv'),x=c.getContext('2d');
let w,h,last=0;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
const drops=Array.from({length:80},()=>({x:Math.random()*w,y:Math.random()*h,v:1+Math.random()*2,l:Math.random()*30}));
let t=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;t+=0.016;
  if(t>8){t=0;const states=[['☀','Soleado',25],['☁','Nublado',18],['☂','Lluvia',15],['❄','Nieve',-2]];
  const s=states[Math.floor(Math.random()*states.length)];
  document.getElementById('s').textContent=s[0];
  document.getElementById('l').textContent=s[1];
  document.getElementById('t').textContent=s[2]+'°';
  drops.forEach(d=>d.y=Math.random()*h);
  }
  x.clearRect(0,0,w,h);
  if(document.getElementById('s').textContent==='☂'){
    x.strokeStyle='rgba(150,200,255,.6)';x.lineWidth=1.5;
    drops.forEach(d=>{x.beginPath();x.moveTo(d.x,d.y);x.lineTo(d.x-2,d.y+12);x.stroke();
      d.y+=d.v*1.5;if(d.y>h)d.y=-10;});
  } else if(document.getElementById('s').textContent==='❄'){
    x.fillStyle='rgba(255,255,255,.8)';
    drops.forEach(d=>{x.beginPath();x.arc(d.x,d.y,2,0,Math.PI*2);x.fill();
      d.y+=d.v*0.5;d.x+=Math.sin(d.y*0.05)*0.5;if(d.y>h)d.y=-10;});
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

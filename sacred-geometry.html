<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Sacred Geometry</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle,#0a1a2a,#000)}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;t+=.016;
  x.fillStyle='rgba(0,0,0,.15)';x.fillRect(0,0,w,h);
  const cx=w/2,cy=h/2;
  const R=Math.min(w,h)*.4;
  x.strokeStyle=`rgba(91,179,255,.5)`;x.lineWidth=1;
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3+t*.1;
    const px=cx+Math.cos(a)*R,py=cy+Math.sin(a)*R;
    x.beginPath();x.arc(px,py,R,0,Math.PI*2);x.stroke();
  }
  for(let i=0;i<6;i++){
    const a1=i*Math.PI/3,a2=(i+1)*Math.PI/3;
    x.beginPath();
    x.moveTo(cx+Math.cos(a1)*R,cy+Math.sin(a1)*R);
    x.arc(cx,cy,R,a1,a2);x.stroke();
  }
  x.beginPath();x.arc(cx,cy,R,0,Math.PI*2);x.stroke();
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6;
    x.beginPath();x.moveTo(cx,cy);
    x.lineTo(cx+Math.cos(a)*R*1.5,cy+Math.sin(a)*R*1.5);x.stroke();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

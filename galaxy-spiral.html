<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Galaxy Spiral</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const N=2000;
const stars=Array.from({length:N},(_,i)=>{
  const r=Math.sqrt(Math.random())*Math.min(w,h)*.45;
  const a=Math.random()*Math.PI*2;
  const arms=3,armAngle=Math.floor(i/(N/arms))*Math.PI*2/3;
  return {r,a:armAngle+Math.atan2(Math.sin(r*.02),Math.cos(r*.02))*1.5,v:.0002+(N-i)/N*.0004}
});
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(0,0,0,.15)';x.fillRect(0,0,w,h);
  const cx=w/2,cy=h/2;
  stars.forEach(s=>{
    s.a+=s.v;
    const px=cx+Math.cos(s.a)*s.r,py=cy+Math.sin(s.a)*s.r;
    const t=1-s.r/Math.min(w,h)*.45/.45;
    x.fillStyle=`hsla(${(s.a*30+200)%360},80%,${30+t*40}%,${0.4+t*.6})`;
    x.fillRect(px,py,1.5,1.5);
  });
  x.fillStyle='#fff';x.shadowColor='#fff';x.shadowBlur=20;
  x.beginPath();x.arc(cx,cy,8,0,Math.PI*2);x.fill();x.shadowBlur=0;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pomodoro</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#1a0f0a;color:#fff;
font-family:'Segoe UI';display:flex;align-items:center;justify-content:center;flex-direction:column}
svg{width:340px;height:340px}
.t{font-size:48px;font-weight:200;margin-top:-30px;letter-spacing:4px}
.l{font-size:13px;color:#6b7280;margin-top:10px;letter-spacing:2px}
</style></head><body>
<svg viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="none" stroke="#2a1a14" stroke-width="6"/>
  <circle id="arc" cx="50" cy="50" r="45" fill="none" stroke="#ff6b35" stroke-width="6"
    stroke-linecap="round" stroke-dasharray="282.7" stroke-dashoffset="282.7"
    transform="rotate(-90 50 50)"/>
  <text x="50" y="55" text-anchor="middle" fill="#fff" font-size="20" font-weight="200" id="pct">0%</text>
</svg>
<div class="t" id="time">25:00</div>
<div class="l">POMODORO TIMER</div>
<script>
const TOTAL=25*60,TICK=1/30;
let elapsed=0,last=0;
const arc=document.getElementById('arc'),pct=document.getElementById('pct'),tm=document.getElementById('time');
function fmt(s){const m=Math.floor(s/60),x=Math.floor(s%60);return `${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`}
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  elapsed+=TICK;if(elapsed>TOTAL)elapsed=0;
  const p=elapsed/TOTAL;
  arc.setAttribute('stroke-dashoffset',282.7*(1-p));
  pct.textContent=Math.round(p*100)+'%';
  tm.textContent=fmt(TOTAL-elapsed);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

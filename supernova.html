<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Supernova</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
let t=0,exploding=false,r=0;
const particles=[];
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function explode(){
  for(let i=0;i<200;i++){
    const a=Math.random()*Math.PI*2;
    const v=2+Math.random()*6;
    particles.push({x:w/2,y:h/2,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:1,h:Math.random()*60+20,r:Math.random()*3+1});
  }
}
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  t+=0.016;
  if(t>5&&!exploding){exploding=true;r=0;explode()}
  if(exploding)r+=2;
  x.fillStyle='rgba(0,0,0,.2)';x.fillRect(0,0,w,h);
  if(!exploding){
    const p=Math.min(1,t/5);
    const sz=10+p*30;
    const gr=x.createRadialGradient(w/2,h/2,0,w/2,h/2,sz*3);
    gr.addColorStop(0,`rgba(255,255,255,${1-p})`);
    gr.addColorStop(.4,`rgba(255,200,100,${(1-p)*.8})`);
    gr.addColorStop(1,'transparent');
    x.fillStyle=gr;x.fillRect(w/2-sz*3,h/2-sz*3,sz*6,sz*6);
  } else {
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vx*=.98;p.vy*=.98;p.life-=.008;
      if(p.life<=0)return;
      x.fillStyle=`hsla(${p.h},100%,${50+p.life*50}%,${p.life})`;
      x.fillRect(p.x,p.y,p.r*2,p.r*2);
    });
    if(r<w){x.strokeStyle=`rgba(255,200,100,${1-r/w})`;x.lineWidth=2;
    x.beginPath();x.arc(w/2,h/2,r,0,Math.PI*2);x.stroke()}
    if(t>10){t=0;exploding=false;particles.length=0}
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

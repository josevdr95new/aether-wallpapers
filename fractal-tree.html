<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Fractal Tree</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 100%,#1a2a1a,#000)}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
function branch(x0,y0,len,angle,depth){
  if(depth<=0||len<2)return;
  const x1=x0+Math.cos(angle)*len,y1=y0+Math.sin(angle)*len;
  x.strokeStyle=`hsla(${120-depth*10+t*20%360},60%,${30+depth*5}%,${.6+depth*.04})`;
  x.lineWidth=depth*.5;x.beginPath();x.moveTo(x0,y0);x.lineTo(x1,y1);x.stroke();
  const sway=Math.sin(t*2+depth)*.1;
  branch(x1,y1,len*.7,angle-.4+sway,depth-1);
  branch(x1,y1,len*.7,angle+.4+sway,depth-1);
}
function loop(n){
  if(n-last<60){requestAnimationFrame(loop);return}last=n;t+=.016;
  x.fillStyle='rgba(0,0,0,.2)';x.fillRect(0,0,w,h);
  branch(w/2,h*.95,Math.min(w,h)*.18,-Math.PI/2,10);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

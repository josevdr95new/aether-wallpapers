<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Wormhole</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const N=300;
const stars=Array.from({length:N},()=>({a:Math.random()*Math.PI*2,z:Math.random(),s:Math.random()*2}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(0,0,0,.25)';x.fillRect(0,0,w,h);
  const cx=w/2,cy=h/2;
  stars.forEach(s=>{
    s.z+=.04;if(s.z>1)s.z=0;
    const p=1/s.z;
    const sx=Math.cos(s.a)*p*150,sy=Math.sin(s.a)*p*150;
    const sz=s.s*(1-s.z)*3;
    const tx=cx+sx,ty=cy+sy;
    x.fillStyle=`rgba(${150+s.z*105},${150+s.z*50},255,${(1-s.z)*.8})`;
    x.beginPath();x.arc(tx,ty,sz,0,Math.PI*2);x.fill();
    x.strokeStyle=`rgba(${150+s.z*105},${150+s.z*50},255,${(1-s.z)*.3})`;
    x.lineWidth=sz/2;x.beginPath();x.moveTo(cx,cy);x.lineTo(tx,ty);x.stroke();
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

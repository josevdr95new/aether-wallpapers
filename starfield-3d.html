<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Starfield 3D</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const N=400;
const stars=Array.from({length:N},()=>({x:(Math.random()-.5)*w,y:(Math.random()-.5)*h,z:Math.random(),s:Math.random()*2}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(0,0,0,.4)';x.fillRect(0,0,w,h);
  stars.forEach(s=>{
    s.z-=.005;if(s.z<=0){s.x=(Math.random()-.5)*w;s.y=(Math.random()-.5)*h;s.z=1}
    const sx=s.x/s.z+w/2,sy=s.y/s.z+h/2;
    const sz=s.s*(1-s.z);
    x.fillStyle=`rgba(255,255,255,${1-s.z})`;
    x.beginPath();x.arc(sx,sy,sz,0,Math.PI*2);x.fill();
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>VHS Glitch</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
const N=w*h*.05;
let t=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;t+=.016;
  x.fillStyle='#0a0a1a';x.fillRect(0,0,w,h);
  for(let i=0;i<N;i++){
    const px=Math.random()*w,py=Math.random()*h;
    const v=Math.random();
    x.fillStyle=`rgba(${100+v*155},${v*100},${200+v*55},${v*.4})`;
    x.fillRect(px,py,1+v*2,1);
  }
  for(let i=0;i<3;i++){
    const y=Math.random()*h,h2=Math.random()*8+2;
    const off=(Math.random()-.5)*20;
    x.fillStyle=`rgba(255,0,100,${Math.random()*.15})`;
    x.fillRect(off,y,w,h2);
  }
  for(let y=0;y<h;y+=3){
    if(Math.random()<.3){
      x.fillStyle=`rgba(255,255,255,${Math.random()*.1})`;
      x.fillRect(0,y,w,1);
    }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Shooting Stars</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const stars=Array.from({length:200},()=>({x:Math.random()*w,y:Math.random()*h,b:Math.random()*.5}));
let showers=[];
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(0,0,0,.3)';x.fillRect(0,0,w,h);
  stars.forEach(s=>{s.b+=(Math.random()-.5)*.05;
    x.fillStyle=`rgba(255,255,255,${s.b})`;x.fillRect(s.x,s.y,1,1)});
  if(Math.random()<.08)showers.push({x:Math.random()*w*.5,y:Math.random()*h*.3,
    vx:8+Math.random()*4,vy:6+Math.random()*3,life:1});
  showers.forEach((s,i)=>{
    s.x+=s.vx;s.y+=s.vy;s.life-=.02;
    if(s.life<=0){showers.splice(i,1);return}
    const gr=x.createLinearGradient(s.x,s.y,s.x-s.vx*5,s.y-s.vy*5);
    gr.addColorStop(0,`rgba(255,255,255,${s.life})`);
    gr.addColorStop(1,'transparent');
    x.strokeStyle=gr;x.lineWidth=2;
    x.beginPath();x.moveTo(s.x,s.y);x.lineTo(s.x-s.vx*5,s.y-s.vy*5);x.stroke();
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

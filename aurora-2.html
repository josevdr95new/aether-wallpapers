<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Aurora Borealis 2</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(180deg,#000a1a,#0a1a2a,#001a1a)}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const M=Array.from({length:20},()=>({
  a:Math.random()*Math.PI*2,f:.5+Math.random()*2,off:Math.random()*100,
  c:`hsl(${100+Math.random()*80},80%,50%)`}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;t+=.016;
  const gr=x.createLinearGradient(0,0,0,h);
  gr.addColorStop(0,'#000a1a');gr.addColorStop(.5,'#0a1a2a');gr.addColorStop(1,'#001a1a');
  x.fillStyle=gr;x.fillRect(0,0,w,h);
  for(let i=0;i<200;i++){
    x.fillStyle=`rgba(255,255,255,${Math.random()*.7})`;
    x.fillRect((i*73)%w,(i*137)%(h*.6),1,1);
  }
  M.forEach(m=>{
    x.beginPath();
    for(let i=0;i<=w;i+=10){
      const y=h*.3+Math.sin(i*m.f*.01+m.a+t+m.off)*60+Math.sin(i*.005+t)*40;
      if(i===0)x.moveTo(i,y);else x.lineTo(i,y);
    }
    x.lineTo(w,h*.6);x.lineTo(0,h*.6);x.closePath();
    x.fillStyle=m.c;x.globalAlpha=.3;
    x.fill();x.globalAlpha=1;
  });
  x.fillStyle='#0a0a14';
  x.beginPath();x.moveTo(0,h);
  for(let i=0;i<=w;i+=30)x.lineTo(i,h-Math.sin(i*.01)*40-30);
  x.lineTo(w,h);x.fill();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

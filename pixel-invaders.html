<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Pixel Invaders</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const ROWS=5,COLS=11;
let inv=[];
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;
  inv=[];
  const sw=w*0.7,sh=h*0.5;
  const bw=sw/COLS,bh=sh/ROWS;
  for(let r=0;r<ROWS;r++)for(let i=0;i<COLS;i++)
    inv.push({x:i*bw+bw/2,y:r*bh+bh/2,bw,bh,row:r,alive:true,dir:1,t:0})}
addEventListener('resize',rs);rs();
let bx=w/2,by=h-40,bs=[];
let lastShot=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(0,0,0,.2)';x.fillRect(0,0,w,h);
  let minX=w,maxX=0,alive=inv.filter(i=>i.alive);
  alive.forEach(i=>{i.x+=i.dir*1.5;if(i.x-i.bw/2<minX)minX=i.x-i.bw/2;
    if(i.x+i.bw/2>maxX)maxX=i.x+i.bw/2});
  if(maxX>w-20||minX<20)alive.forEach(i=>{i.dir*=-1;i.y+=20});
  alive.forEach(i=>{
    const c1=i.row===0?'#ff2d92':i.row<2?'#5eb3ff':i.row<4?'#4ade80':'#fbbf24';
    x.fillStyle=c1;x.fillRect(i.x-i.bw/2,i.y-i.bh/2,i.bw,i.bh);
    x.fillStyle='#000';x.fillRect(i.x-8,i.y-3,4,4);x.fillRect(i.x+4,i.y-3,4,4);
  });
  x.fillStyle='#5eb3ff';x.fillRect(bx-15,by-8,30,12);x.fillRect(bx-3,by-18,6,12);
  bs.forEach((s,i)=>{s.y-=8;if(s.y<0)bs.splice(i,1);
    x.fillStyle='#fff';x.fillRect(s.x-1,s.y-6,2,8);
    alive.forEach(j=>{if(!j.alive)return;if(Math.abs(s.x-j.x)<j.bw/2&&Math.abs(s.y-j.y)<j.bh/2){j.alive=false;bs.splice(i,1)}})});
  if(n-lastShot>500&&alive.length>0){bs.push({x:bx,y:by-20});lastShot=n}
  requestAnimationFrame(loop);
}
addEventListener('mousemove',e=>bx=Math.max(20,Math.min(w-20,e.clientX)));
requestAnimationFrame(loop);
</script></body></html>

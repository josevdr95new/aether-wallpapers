<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Fireflies</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a1a14}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const flies=Array.from({length:60},()=>({x:Math.random()*w,y:Math.random()*h,
vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8,
p:Math.random()*Math.PI*2,t:0}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(10,26,20,.4)';x.fillRect(0,0,w,h);
  flies.forEach(f=>{
    f.x+=f.vx+Math.sin(f.t*.05)*.3;f.y+=f.vy+Math.cos(f.t*.07)*.3;
    f.t++;
    if(f.x<0)f.x=w;if(f.x>w)f.x=0;if(f.y<0)f.y=h;if(f.y>h)f.y=0;
    const glow=Math.max(0,Math.sin(f.t*.1+f.p));
    const sz=1+glow*3;
    const gr=x.createRadialGradient(f.x,f.y,0,f.x,f.y,sz*4);
    gr.addColorStop(0,`rgba(180,255,80,${glow})`);
    gr.addColorStop(.5,`rgba(180,255,80,${glow*.3})`);
    gr.addColorStop(1,'transparent');
    x.fillStyle=gr;x.beginPath();x.arc(f.x,f.y,sz*4,0,Math.PI*2);x.fill();
    x.fillStyle=`rgba(220,255,180,${.7+glow*.3})`;
    x.beginPath();x.arc(f.x,f.y,sz,0,Math.PI*2);x.fill();
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

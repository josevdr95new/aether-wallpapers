<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Snow Drift</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(180deg,#1a2030,#0a1018)}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const flakes=Array.from({length:300},()=>({x:Math.random()*w,y:Math.random()*h,
r:1+Math.random()*3,v:.3+Math.random()*.8,a:Math.random()*Math.PI*2}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(26,32,48,.2)';x.fillRect(0,0,w,h);
  flakes.forEach(f=>{
    f.y+=f.v;f.x+=Math.sin(f.a)*.4;f.a+=.05;
    if(f.y>h){f.y=-5;f.x=Math.random()*w}
    x.fillStyle=`rgba(255,255,255,${.5+f.r/6})`;
    x.beginPath();x.arc(f.x,f.y,f.r,0,Math.PI*2);x.fill();
  });
  x.fillStyle='#fff';
  x.beginPath();x.moveTo(0,h);for(let i=0;i<=w;i+=40){
    x.lineTo(i,h-Math.sin(i*.01)*8);
  }x.lineTo(w,h);x.fill();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

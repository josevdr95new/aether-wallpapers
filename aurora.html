<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Aurora</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#02050f}</style>
</head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let W,H,bands=[];
function resize(){W=c.width=innerWidth;H=c.height=innerHeight;init()}
function init(){
  bands=[];
  const N=7;
  for(let i=0;i<N;i++){
    bands.push({
      hue:120+Math.random()*140,
      baseY:H*(.3+Math.random()*.4),
      amp:H*.15+Math.random()*H*.1,
      thick:H*.12+Math.random()*H*.08,
      speed:.0003+Math.random()*.0005,
      phase:Math.random()*Math.PI*2,
      sat:55+Math.random()*25,
      light:45+Math.random()*15
    });
  }
}
addEventListener('resize',resize);resize();

function noise(x,y){
  const s=Math.sin(x*12.9898+y*78.233)*43758.5453;
  return s-Math.floor(s);
}
function smooth(x,y){
  const ix=Math.floor(x),iy=Math.floor(y);
  const fx=x-ix,fy=y-iy;
  const a=noise(ix,iy),b=noise(ix+1,iy),cc=noise(ix,iy+1),d=noise(ix+1,iy+1);
  const u=fx*fx*(3-2*fx),v=fy*fy*(3-2*fy);
  return a*(1-u)*(1-v)+b*u*(1-v)+cc*(1-u)*v+d*u*v;
}
let t0=performance.now();
function frame(t){
  const dt=t-t0;t0=t;
  // cielo nocturno
  const g=x.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#02030a');g.addColorStop(.5,'#050a1c');g.addColorStop(1,'#0a0518');
  x.fillStyle=g;x.fillRect(0,0,W,H);

  // estrellas
  for(let i=0;i<140;i++){
    const sx=(i*173+i*i*7)%W,sy=(i*97+i*i*11)%H;
    const a=.4+Math.sin(t*.001+i)*.4;
    x.fillStyle=`rgba(220,230,255,${a*.7})`;
    x.fillRect(sx,sy,1,1);
  }

  // bandas aurora
  x.globalCompositeOperation='screen';
  for(const b of bands){
    b.phase+=b.speed*dt;
    x.beginPath();
    x.moveTo(0,H);
    for(let px=0;px<=W;px+=4){
      const n=smooth(px*.003+b.phase,2);
      const y=b.baseY+Math.sin(px*.005+b.phase)*b.amp*.5+(n-.5)*b.amp;
      x.lineTo(px,y);
    }
    x.lineTo(W,H);x.closePath();
    const grad=x.createLinearGradient(0,b.baseY-b.amp,0,b.baseY+b.amp);
    grad.addColorStop(0,`hsla(${b.hue},${b.sat}%,${b.light}%,0)`);
    grad.addColorStop(.5,`hsla(${b.hue},${b.sat}%,${b.light}%,.35)`);
    grad.addColorStop(1,`hsla(${b.hue},${b.sat}%,${b.light}%,0)`);
    x.fillStyle=grad;x.fill();
  }
  x.globalCompositeOperation='source-over';

  // luna
  const mx=W*.85,my=H*.18,r=Math.min(W,H)*.04;
  const lg=x.createRadialGradient(mx,my,0,mx,my,r*3);
  lg.addColorStop(0,'rgba(255,250,230,.95)');
  lg.addColorStop(.3,'rgba(255,250,230,.4)');
  lg.addColorStop(1,'rgba(255,250,230,0)');
  x.fillStyle=lg;x.beginPath();x.arc(mx,my,r*3,0,Math.PI*2);x.fill();
  x.fillStyle='#fefae0';x.beginPath();x.arc(mx,my,r,0,Math.PI*2);x.fill();
  x.fillStyle='rgba(0,0,0,.08)';x.beginPath();x.arc(mx-r*.3,my-r*.2,r*.85,0,Math.PI*2);x.fill();

  // montañas lejanas
  x.fillStyle='rgba(0,0,0,.6)';
  x.beginPath();x.moveTo(0,H);
  for(let i=0;i<=20;i++){
    const px=i/20*W;
    const ph=smooth(i*.5,9)*H*.15;
    x.lineTo(px,H*.7+ph);
  }
  x.lineTo(W,H);x.closePath();x.fill();
  // montañas cercanas
  x.fillStyle='rgba(0,0,0,.85)';
  x.beginPath();x.moveTo(0,H);
  for(let i=0;i<=20;i++){
    const px=i/20*W;
    const ph=smooth(i*.3+5,2)*H*.2;
    x.lineTo(px,H*.85+ph);
  }
  x.lineTo(W,H);x.closePath();x.fill();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body></html>

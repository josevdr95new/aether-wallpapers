<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Black Hole</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const N=200;
const stars=Array.from({length:N},(_,i)=>({
  a:i*Math.PI*2/N,d:.7+Math.random()*.25,v:Math.random()<.5?1:-1,s:Math.random()+1
}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;t+=.016;
  x.fillStyle='rgba(0,0,0,.3)';x.fillRect(0,0,w,h);
  const cx=w/2,cy=h/2,Rs=Math.min(w,h)*.1,Rm=Math.min(w,h)*.35;
  stars.forEach(s=>{
    s.a+=s.v*.001;
    const r=Rm*s.d;
    const px=cx+Math.cos(s.a)*r,py=cy+Math.sin(s.a)*r*s.d;
    const heat=Math.max(0,1-Math.abs(s.d-.9)*5);
    x.fillStyle=`hsl(${30+heat*30},100%,${50+heat*30}%,${0.5+heat*.5})`;
    x.fillRect(px,py,s.s*1.5,s.s*1.5);
  });
  const gr=x.createRadialGradient(cx,cy,0,cx,cy,Rm*1.2);
  gr.addColorStop(0,'#000');gr.addColorStop(.4,'rgba(0,0,0,0)');
  gr.addColorStop(.45,`rgba(255,180,80,${.6+Math.sin(t*2)*.2})`);
  gr.addColorStop(.5,'rgba(255,100,50,.4)');
  gr.addColorStop(.7,'rgba(255,50,30,.2)');
  gr.addColorStop(1,'transparent');
  x.fillStyle=gr;x.beginPath();x.ellipse(cx,cy,Rm*1.2,Rm*.4,0,0,Math.PI*2);x.fill();
  x.fillStyle='#000';x.beginPath();x.arc(cx,cy,Rs,0,Math.PI*2);x.fill();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

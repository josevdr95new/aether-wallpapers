<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Comet Trail</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const stars=Array.from({length:300},()=>({x:Math.random()*w,y:Math.random()*h,b:Math.random()*.5}));
let comet={x:0,y:0,trail:[]};
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;
  comet={x:-50,y:h*.5,trail:[]}}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(0,0,0,.3)';x.fillRect(0,0,w,h);
  stars.forEach(s=>{
    s.b+=(Math.random()-.5)*.05;
    x.fillStyle=`rgba(255,255,255,${s.b})`;x.fillRect(s.x,s.y,1,1);
  });
  comet.x+=8;comet.y+=3;
  comet.trail.push({x:comet.x,y:comet.y});
  if(comet.trail.length>40)comet.trail.shift();
  if(comet.x>w+50){comet.x=-50;comet.y=Math.random()*h;comet.trail=[]}
  for(let i=0;i<comet.trail.length;i++){
    const p=comet.trail[i],a=i/comet.trail.length;
    x.fillStyle=`rgba(${150+a*100},${200+a*55},255,${a*.6})`;
    x.beginPath();x.arc(p.x,p.y,a*4,0,Math.PI*2);x.fill();
  }
  const gr=x.createRadialGradient(comet.x,comet.y,0,comet.x,comet.y,20);
  gr.addColorStop(0,'#fff');gr.addColorStop(.5,'#9ed8ff');gr.addColorStop(1,'transparent');
  x.fillStyle=gr;x.beginPath();x.arc(comet.x,comet.y,20,0,Math.PI*2);x.fill();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Arcade Grid</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000;perspective:300px}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;t+=.016;
  x.fillStyle='rgba(0,0,0,.4)';x.fillRect(0,0,w,h);
  const horizon=h*.5,gy=horizon*Math.tan(Math.PI/6);
  x.strokeStyle='#ff2d92';x.lineWidth=1;
  for(let i=-20;i<20;i++){
    const y=gy+Math.sin(t+i*.5)*20;
    x.beginPath();x.moveTo(0,horizon+y);x.lineTo(w,horizon+y);x.stroke();
  }
  for(let i=0;i<20;i++){
    const z=((i/20)+t*.1)%1;
    const y=horizon+gy*(z*z);
    const alpha=Math.max(0,1-z);
    x.strokeStyle=`rgba(0,255,255,${alpha})`;x.lineWidth=1;
    x.beginPath();x.moveTo(0,y);x.lineTo(w,y);x.stroke();
  }
  const gr=x.createLinearGradient(0,0,0,horizon);
  gr.addColorStop(0,'#1a0033');gr.addColorStop(1,'#000');
  x.fillStyle=gr;x.fillRect(0,0,w,horizon);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Kaleidoscope</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
const S=6;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;t+=.016;
  x.fillStyle='rgba(0,0,0,.2)';x.fillRect(0,0,w,h);
  x.save();x.translate(w/2,h/2);x.rotate(t*.2);
  for(let s=0;s<S;s++){
    x.save();x.rotate(s*Math.PI*2/S);
    for(let i=0;i<30;i++){
      const a=i*.3+t;
      const r=50+Math.sin(a)*30+Math.sin(a*2)*20;
      const x2=Math.cos(a+i*.1)*r,y2=Math.sin(a+i*.1)*r;
      x.fillStyle=`hsl(${(i*12+t*30)%360},80%,60%)`;
      x.globalAlpha=.6;
      x.beginPath();x.arc(x2,y2,3,0,Math.PI*2);x.fill();
    }
    x.restore();
  }
  x.globalAlpha=1;
  x.strokeStyle=`hsl(${(t*50)%360},80%,60%)`;x.lineWidth=2;
  x.beginPath();x.arc(0,0,30,0,Math.PI*2);x.stroke();
  x.restore();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

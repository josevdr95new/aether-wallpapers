<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Battery Meter</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a0a14;color:#fff;
font-family:'Segoe UI';display:flex;align-items:center;justify-content:center;flex-direction:column;gap:30px}
.b{width:200px;height:100px;border:5px solid #fff;border-radius:14px;position:relative;padding:6px}
.b::after{content:"";position:absolute;right:-12px;top:50%;transform:translateY(-50%);
width:8px;height:30px;background:#fff;border-radius:0 3px 3px 0}
.fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#4ade80,#22c55e);
transition:width .3s,background .3s}
.p{font-size:96px;font-weight:200;letter-spacing:-3px;background:linear-gradient(135deg,#4ade80,#22c55e);
-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.s{font-size:12px;color:#9ca3af;letter-spacing:3px}
</style></head><body>
<div class="b"><div class="fill" id="f"></div></div>
<div class="p" id="p">100%</div>
<div class="s">BATTERY · ESTIMATED</div>
<script>
let lvl=87,last=0;
function loop(n){
  if(n-last<2000){requestAnimationFrame(loop);return}last=n;
  lvl+=Math.random()>.5?-1:1;if(lvl<20)lvl=20;if(lvl>100)lvl=100;
  const f=document.getElementById('f'),p=document.getElementById('p');
  f.style.width=lvl+'%';
  if(lvl<20)f.style.background='linear-gradient(90deg,#ef4444,#dc2626)';
  else if(lvl<50)f.style.background='linear-gradient(90deg,#fbbf24,#f59e0b)';
  else f.style.background='linear-gradient(90deg,#4ade80,#22c55e)';
  p.textContent=lvl+'%';
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

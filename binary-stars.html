<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Binary Stars</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const N=400;
const bg=Array.from({length:N},()=>({x:Math.random()*w,y:Math.random()*h,b:Math.random()*.5+.5}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;t+=.016;
  x.fillStyle='rgba(0,0,0,.3)';x.fillRect(0,0,w,h);
  bg.forEach(s=>{
    s.b+=(Math.random()-.5)*.05;
    x.fillStyle=`rgba(255,255,255,${s.b})`;x.fillRect(s.x,s.y,1,1);
  });
  const cx=w/2,cy=h/2,r=Math.min(w,h)*.15;
  const a1x=cx+Math.cos(t)*r,a1y=cy+Math.sin(t)*r;
  const a2x=cx-Math.cos(t)*r,a2y=cy-Math.sin(t)*r;
  [[a1x,a1y,'#5eb3ff',20],[a2x,a2y,'#ff7ad9',20]].forEach(([px,py,c,sz])=>{
    const gr=x.createRadialGradient(px,py,0,px,py,sz*4);
    gr.addColorStop(0,'#fff');gr.addColorStop(.2,c);gr.addColorStop(1,'transparent');
    x.fillStyle=gr;x.beginPath();x.arc(px,py,sz*4,0,Math.PI*2);x.fill();
  });
  x.strokeStyle='rgba(255,255,255,.05)';x.lineWidth=1;
  x.beginPath();x.arc(cx,cy,r*2,0,Math.PI*2);x.stroke();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

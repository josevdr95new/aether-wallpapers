<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Hex Grid</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a0a14}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const R=40;
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
let t=0;
const H=Math.sqrt(3)*R;
function loop(n){
  if(n-last<100){requestAnimationFrame(loop);return}last=n;t+=.016;
  x.fillStyle='rgba(10,10,20,.2)';x.fillRect(0,0,w,h);
  for(let row=-1;row*1.5*H<h+2*H;row++){
    for(let col=-1;col*R*1.5<w+2*R;col++){
      const x0=col*R*1.5,y0=row*H+(col%2?H/2:0);
      const pulse=Math.sin(t*2+col*.5+row*.3);
      const alpha=.2+pulse*.3;
      const r=Math.max(0,Math.sin(t+col*.7+row*.5));
      x.strokeStyle=`rgba(${91+r*100},${179-r*80},255,${alpha})`;
      x.lineWidth=1;
      x.beginPath();
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3;
        if(i===0)x.moveTo(x0+Math.cos(a)*R,y0+Math.sin(a)*R);
        else x.lineTo(x0+Math.cos(a)*R,y0+Math.sin(a)*R);
      }
      x.closePath();x.stroke();
      if(r>.7){
        x.fillStyle=`rgba(91,179,255,${r*.3})`;
        x.beginPath();x.arc(x0,y0,R*.6,0,Math.PI*2);x.fill();
      }
    }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

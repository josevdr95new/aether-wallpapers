<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Autumn Leaves</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:linear-gradient(180deg,#3a1a0a,#0a0500)}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const L=Array.from({length:50},()=>({x:Math.random()*w,y:Math.random()*h,
vx:Math.random()*1-.5,vy:.5+Math.random()*1.5,
r:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.05,
c:`hsl(${10+Math.random()*40},80%,${30+Math.random()*30}%)`,sz:8+Math.random()*8}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(58,26,10,.15)';x.fillRect(0,0,w,h);
  L.forEach(l=>{
    l.x+=l.vx+Math.sin(l.r)*1;l.y+=l.vy;l.r+=l.vr;
    if(l.y>h){l.y=-20;l.x=Math.random()*w}
    x.save();x.translate(l.x,l.y);x.rotate(l.r);
    x.fillStyle=l.c;x.beginPath();
    x.ellipse(0,0,l.sz,l.sz/2,0,0,Math.PI*2);x.fill();
    x.strokeStyle='#1a0a00';x.lineWidth=1;
    x.beginPath();x.moveTo(0,-l.sz/2);x.lineTo(0,l.sz/2);x.stroke();
    x.restore();
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

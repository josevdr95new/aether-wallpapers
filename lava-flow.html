<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Lava Flow</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#1a0500}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const L=Array.from({length:80},()=>({x:Math.random()*w,y:h+Math.random()*50,
r:5+Math.random()*15,v:1+Math.random()*2,c:Math.random()<.5?'#ff3300':'#ffaa00'}));
function rs(){w=c.width=innerWidth;h=c.height=innerHeight}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(26,5,0,.25)';x.fillRect(0,0,w,h);
  L.forEach(l=>{
    l.y-=l.v;l.x+=Math.sin(l.y*.01)*2;
    if(l.y<-50)l.y=h+10;
    const gr=x.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r*3);
    gr.addColorStop(0,l.c);gr.addColorStop(.5,'rgba(255,100,0,.3)');
    gr.addColorStop(1,'transparent');
    x.fillStyle=gr;x.beginPath();x.arc(l.x,l.y,l.r*3,0,Math.PI*2);x.fill();
  });
  for(let i=0;i<5;i++){
    const sx=Math.random()*w;
    x.fillStyle='rgba(255,255,200,.1)';
    x.beginPath();x.arc(sx,h-10,4,0,Math.PI*2);x.fill();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>

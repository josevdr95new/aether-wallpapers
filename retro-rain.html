<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Retro Rain</title>
<style>html,body{margin:0;height:100%;overflow:hidden;background:#0a0014}
canvas{display:block;width:100%;height:100%}
</style></head><body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
let w,h,last=0;
const fs=18;
const cols=Math.floor(innerWidth/fs);
let drops=Array(cols).fill(0);
const chars='アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789';
function rs(){w=c.width=innerWidth;h=c.height=innerHeight;
  drops=Array(Math.floor(w/fs)).fill(0)}
addEventListener('resize',rs);rs();
function loop(n){
  if(n-last<32){requestAnimationFrame(loop);return}last=n;
  x.fillStyle='rgba(10,0,20,.08)';x.fillRect(0,0,w,h);
  x.font=`${fs}px monospace`;
  for(let i=0;i<drops.length;i++){
    const ch=chars[Math.floor(Math.random()*chars.length)];
    const y=drops[i]*fs;
    const gr=x.createLinearGradient(0,y-fs*5,0,y);
    gr.addColorStop(0,'rgba(255,45,146,0)');
    gr.addColorStop(1,'#ff2d92');
    x.fillStyle=gr;x.fillText(ch,i*fs,y);
    if(y>h&&Math.random()>.975)drops[i]=0;
    drops[i]++;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>
